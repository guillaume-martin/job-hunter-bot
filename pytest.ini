[pytest]
testpaths = tests
markers =
    unit: fast, no network, no external services
    integration: real network calls, run manually or on schedule
    e2e: full end-to-end, requires full environment
env =
    AWS_REGION=us-east-1
    FIREFOX_PATH=/usr/local/bin/firefox                 # pragma: allowlist secret
    GECKODRIVER_PATH=/usr/local/bin/geckodriver         # pragma: allowlist secret
    SENDER=sender@example.com
    RECIPIENT=recipient@example.com
    ROLE_ARN=arn:aws:iam::123456789012:role/RoleName    # pragma: allowlist secret
    SESSION_NAME=RemoteBotTestSession
    AI_API_KEY=a1b2c3d4-e5f6-7g8h-9i0j-k1l2m3n4o5p6     # pragma: allowlist secret
    JOBS_TABLE=test_jobs_table
    RETENTION_DAYS=30
