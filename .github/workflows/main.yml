name: CI/CD Pipeline

on:
  push:
    branches: [ "feature/h-actions" ]


jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 
      - uses: actions/checkout@v2

      # Step 2:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
          architecture: x64

      # Step 3
      - name: Install Python Virtual Env
        run: pip3 install virtualenv

      # Step 4
      - name: Set up Virtual Env
        uses: actions/cache@v2
        id: cache-venv
        with:
          path: venv
          key:  ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-venv-

      # Step 5
      - name: Activate and Install Dependencies into Virtual Env
        run: |
          python -m venv venv
          source venv/bin/activate 
          pip3 install -r requirements.txt
        if: steps.cache-venv.outputs.cache-hit != 'true'

      # Step 6
      - name: Run Tests
        run: . venv/bin/activate && pytest

      # Step 7
      - name: Create zipfile archive of dependencies
        run: | 
          cd ./venv/lib/python3.8/site-packages
          zip -r9 ../../../../remote-bot.zip .

      # Step 8
      - name: Add app to zip file
        run: cd ./src && zip -g ../remote-bot.zip -r .

      # Step 9 
      - name: Upload zip file arifact
        uses: actions/upload-artifact@v2
        with:
            name: remote-bot
            path: remote-bot.zip

  continuous-deployment:
      runs-on: ubuntu-latest
      needs: [continuous-integration]
      if: github.ref == 'refs/heads/main'
      steps:
          # Step 1
          - name: Install AWS CLI
            uses: unfor19/install-aws-cli-action@v1
            with:
                version: 1
            env: 
                AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

        # Step 2
          - name: Download Lambda remote-bot.zip
            uses: actions/download-artifact@v2
            with:
                name: remote-bot

        # Step 3
          - name: Update Lambda function
            run: aws lambda update-function-code --function-name remote-bot --zip-file fileb://remote-bot.zip --publish
            env:
                AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

