name: CI/CD Pipeline

on:
    push:
        branches: [ setup-deploy ]


jobs:
    continuous-integration:
        runs-on: ubuntu-latest

        steps:
            # Step 1: 
            - uses: actions/checkout@v2

            # Step 2:
            - name: Set up Python
              uses: actions/checkout@v2
              with:
                  python-version: 3.9
                  architecture: x64

            # Step 3
            - name: Install Python Virtual Env
              run: pip3 install virtualenv

            # Step 4
            - name: Set up Virtual Env
              uses: actions/cache@v2
              id: cache-venv
              with:
                  path: venv
                  key:  ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
                  restore-keys: ${{ runner.os }}-venv-

            # Step 5
            - name: Activate and Install Dependencies into Virtual Env
              run: python -m venv venv && source venv/bin/activate && pip3 install -r requirements.txt
              if: steps.cache-venv.outputs.cache-hit != 'true'

            # Step 6
            - name: Activate venv and Run Test
              run: . venv/bin/activate && pytest

            # Step 7
            - name: Create zipfile archive of dependencies
              run: | 
                  cd ./venv/lib/python3.9/site-packages
                  zip -r9 ../../../../remote-bot.zip .

            # Step 8
            - name: Add app to zip file
              run: cd ./src && zip -g ../remote-bot.zip -r .

            # Step 9 
            - name: Upload zip file arifact
              uses: actions/upload-artifact@v2
              with:
                  name: remote-bot
                  path: remote-bot.zip
