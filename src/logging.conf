[loggers]
keys=root

[handlers]
keys=consoleHandler

[formatters]
keys=streamFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[handler_consoleHandler]
class=StreamHandler
formatter=streamFormatter
args=(sys.stdout,)

[formatter_streamFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
